version: "2"
linters:
  default: all
  disable:
    - cyclop
    - depguard
    - err113
    - exhaustruct
    - forbidigo
    - funlen
    - gochecknoglobals
    - gocognit
    - goconst
    - gocyclo
    - goprintffuncname
    - lll
    - mnd
    - nestif
    - nlreturn
    - noctx
    - noinlineerr
    - paralleltest
    - testpackage
    - varnamelen
    - wrapcheck
    - wsl
    - wsl_v5
  settings:
    errcheck:
      check-type-assertions: true
    revive:
      enable-default-rules: true
      rules:
        - name: package-comments
          disabled: true
        - name: unused-parameter
          disabled: true
        - name: exported
          disabled: true
        - name: var-naming
          disabled: true
  exclusions:
    rules:
      - source: "^\\s+defer\\s"
        linters:
          - errcheck
issues:
  max-issues-per-linter: 0
  max-same-issues: 0
  uniq-by-line: false
