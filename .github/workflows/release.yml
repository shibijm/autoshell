name: Release
run-name: Release ${{ github.ref_name }}
on:
  push:
    tags:
      - v*.*.*
  workflow_dispatch:
jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Install dependencies
        run: make install-deps
      - name: Lint
        run: make lint
      - name: Test
        run: make test
      - name: Build
        env:
          DEVICE_PASS_SEED: ${{ secrets.DEVICE_PASS_SEED }}
        run: make build
      - name: Create release ZIP files
        run: |
          cd out
          for filename in *; do
            if [[ -d $filename ]]; then
              mv $filename ${{ github.event.repository.name }}
              zip -rm ${{ github.event.repository.name }}-${{ github.ref_name }}-$filename.zip ${{ github.event.repository.name }}
            fi
          done
      - name: Release on GitHub
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b
        with:
          files: out/*.zip
          generate_release_notes: true
      - name: Generate signed build provenance attestation
        uses: actions/attest-build-provenance@v3
        with:
          subject-path: out/*.zip
